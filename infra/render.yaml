services:
  - type: web
    name: forge-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: starter
    region: frankfurt
    healthCheckPath: /healthz
    envVars:
      - key: FORGE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: forge-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: CORS_ORIGINS
        sync: false  # set after web URL is known

  - type: web
    name: forge-web
    runtime: docker
    rootDir: web
    dockerfilePath: ./Dockerfile
    plan: starter
    region: frankfurt
    envVars:
      - key: VITE_API_URL
        sync: false  # set to https://forge-backend.onrender.com

databases:
  - name: forge-db
    plan: free
    databaseName: forge
    region: frankfurt
